<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | Urgency Flow</title>
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: block;
            width: auto;
            overflow: auto;
            touch-action: auto;
        }

        .notes-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 18px;
            min-height: 100vh;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .notes-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .notes-title {
            font-size: 22px;
            margin: 0;
        }

        .notes-topbar-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
        }

        .notes-layout {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        .notes-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .notes-panel-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .notes-list-controls {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .notes-list-scroll {
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px;
            min-height: 0;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .notes-list-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
        }

        .notes-list-item.active {
            border-color: var(--accent);
            background: rgba(79, 156, 249, 0.12);
        }

        .notes-list-item-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .notes-list-item-preview {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.35;
            margin-bottom: 6px;
        }

        .notes-list-item-meta {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .notes-editor-main {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            gap: 10px;
            padding: 12px;
        }

        .editor-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .editor-meta-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .editor-meta-field label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .notes-editor-main input,
        .notes-editor-main textarea,
        .notes-editor-main select,
        #notes-search {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border);
            background: var(--panel-bg-elevated);
            color: var(--text-main);
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 13px;
        }

        #note-title {
            font-weight: 600;
        }

        .editor-action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .block-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .block-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 2px;
            -webkit-overflow-scrolling: touch;
        }

        .note-block {
            border: 1px solid rgba(0, 0, 0, 0.18);
            border-radius: 9px;
            padding: 9px;
        }

        .note-block-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }

        .note-block-controls select {
            max-width: 180px;
        }

        .note-block-controls input {
            flex: 1;
            min-width: 140px;
        }

        .note-block-controls button {
            min-width: 34px;
        }

        .note-block textarea {
            width: 100%;
            box-sizing: border-box;
            min-height: 120px;
            resize: vertical;
            border: 1px solid rgba(0, 0, 0, 0.18);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            line-height: 1.45;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.75);
        }

        .note-block-preview {
            width: 100%;
            box-sizing: border-box;
            min-height: 70px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            line-height: 1.45;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.78);
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .notes-btn-inline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .notes-muted {
            color: var(--text-muted);
            font-size: 11px;
        }

        .notes-status {
            font-size: 11px;
            color: var(--text-muted);
            min-height: 16px;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            font-size: 12px;
            padding: 24px 12px;
        }

        @media (max-width: 900px) {
            .notes-layout {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .notes-panel {
                min-height: 280px;
            }

            .editor-meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <main class="notes-page">
        <div class="notes-topbar">
            <h1 class="notes-title">Notes Workspace</h1>
            <div style="display:flex; gap:12px; align-items:center;">
                <span class="notes-muted">Shared with main app storage</span>
                <a class="notes-topbar-link" href="../index.html">Back to Main App</a>
            </div>
        </div>

        <section class="notes-layout">
            <aside class="notes-panel">
                <div class="notes-panel-header">
                    <strong>All Notes</strong>
                    <span id="notes-count" class="notes-status"></span>
                </div>
                <div class="notes-list-controls">
                    <input type="text" id="notes-search" placeholder="Search notes...">
                    <button id="new-note-btn" class="btn notes-btn-inline">+ New</button>
                </div>
                <div id="notes-list" class="notes-list-scroll"></div>
            </aside>

            <section class="notes-panel">
                <div class="notes-panel-header">
                    <strong>Editor</strong>
                    <span id="notes-status" class="notes-status"></span>
                </div>
                <div class="notes-editor-main">
                    <input type="text" id="note-title" placeholder="Note title">

                    <div class="editor-meta-grid">
                        <div class="editor-meta-field">
                            <label for="note-task-ids">Linked Task IDs (comma separated)</label>
                            <input type="text" id="note-task-ids" placeholder="task_123, task_456">
                        </div>
                        <div class="editor-meta-field">
                            <label for="bookmark-jump">Jump To Bookmark</label>
                            <select id="bookmark-jump">
                                <option value="">No bookmarks</option>
                            </select>
                        </div>
                    </div>

                    <div class="editor-action-row">
                        <button id="add-block-btn" class="btn notes-btn-inline">+ Add Block</button>
                        <button id="toggle-view-btn" class="btn notes-btn-inline">View Mode</button>
                        <button id="pin-note-btn" class="btn notes-btn-inline">Pin</button>
                        <button id="save-note-btn" class="btn btn-primary notes-btn-inline">Save</button>
                        <button id="delete-note-btn" class="btn notes-btn-inline">Delete</button>
                    </div>

                    <div id="blocks-container" class="block-list"></div>
                </div>
            </section>
        </section>
    </main>

    <script defer src="../assets/js/db.js"></script>
    <script defer src="../assets/js/notesRepository.js"></script>
    <script defer src="../assets/js/notesSync.js"></script>
    <script defer src="../assets/js/utils.js"></script>
    <script defer src="notes.js"></script>
</body>

</html>
